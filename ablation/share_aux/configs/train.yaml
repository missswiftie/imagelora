# Ablation: Hypernet 直接预测每层 rank-1 全量 ΔW (A|B, dim=in+out)，无 aux

pretrained_model_name_or_path: "pretrained_models/stable-diffusion-v1-5"

train_data_meta: "data/metadata.jsonl"
train_data_dir: "sampled_100styles_150pairs_package"
resolution: 512
max_samples: 15000

rank: 1
network_alpha: 1.0

decoder_blocks: 8
sample_iters: 4
dinov2_model: "dinov2_vitb14"
dinov2_model_path: "pretrained_models/dinov2-base"

output_dir: "ablation/share_aux/outputs/full_delta"
seed: 42
train_batch_size: 1               # 每卡 batch；full ΔW ablation 显存大，先降到 1
gradient_accumulation_steps: 8    # 5卡×1×8=40 等效 batch，与之前 4×2×5 相同
num_train_epochs: 10
max_train_steps: -1
learning_rate: 1.0e-4
lr_scheduler: "cosine"
lr_warmup_steps: 500
adam_beta1: 0.9
adam_beta2: 0.999
adam_weight_decay: 0.01
adam_epsilon: 1.0e-8
max_grad_norm: 1.0
mixed_precision: "fp16"
gradient_checkpointing: true
enable_attention_slicing: true
attention_slice_size: "max"       # "auto" 或 "max"（更省显存）
enable_xformers: true             # 若已安装 xformers
enable_vae_slicing: true
enable_vae_tiling: false
cpu_offload_encoders: true        # VAE/CLIP/DINO 用时上 GPU，算完回 CPU
dinov2_fp16: true
text_drop_ratio: 0.1

logging_steps: 50
checkpointing_steps: 1000
checkpoints_total_limit: 5
report_to: "tensorboard"
